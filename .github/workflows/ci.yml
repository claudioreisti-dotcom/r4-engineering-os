name: R4 EOS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  knowledge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Validate knowledge
        run: npm run validate
      - name: Validate DOK1 example (downstream, reuses Kernel)
        run: node src/cli.ts validate --project ../../examples/dok1
      - name: Check generated docs are in sync
        run: npm run check
